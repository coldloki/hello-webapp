services:
  hello-webapp:
    image: hello-webapp:latest
    container_name: hello-webapp
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  log-watcher:
    image: alpine:latest
    container_name: log-watcher
    command: ["sh", "-c", "tail -f /dev/null"]
    restart: unless-stopped
